name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install project (lean serve extras + viz + dev; NO TensorFlow)
        # The `research` extra (TensorFlow / LSTM) is deliberately NOT installed:
        # the serve path and CI never import it.
        run: uv pip install --system -e ".[data,viz,dev]"

      - name: Lint (ruff)
        run: ruff check src

      - name: Type-check (mypy strict)
        run: mypy src

      - name: Test (pytest + coverage gate)
        # Research/LSTM/slow tests are excluded so the serve path is exercised
        # without TensorFlow.
        run: pytest -q -m "not research and not slow" --cov=volforecast --cov-report=term --cov-fail-under=85
