name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The project requires Python >= 3.11, so the matrix starts at 3.11.
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project (lean serve extras + viz + dev; NO TensorFlow)
        # The `research` extra (TensorFlow / LSTM) is deliberately NOT installed:
        # the serve path and CI never import it, and the LSTM tests are marked
        # `research` so they are skipped below.
        run: uv pip install --system -e ".[data,viz,dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Format check (ruff)
        run: ruff format --check src tests

      - name: Type-check (mypy strict)
        run: mypy src

      - name: Test (pytest + coverage gate)
        # Research/LSTM/slow tests are excluded so the serve path is exercised
        # without TensorFlow. The 85% gate is enforced by the coverage config.
        run: >-
          pytest -q -m "not research and not slow"
          --cov=volforecast --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
